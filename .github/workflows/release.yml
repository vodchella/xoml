name: CI

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64-linux
          - runs-on: ubuntu-24.04-arm
            target: arm64-linux
          - runs-on: windows-latest
            target: x86_64-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        if: runner.os == 'Linux'
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run tests (nix dev shell)
        if: runner.os == 'Linux'
        run: nix develop -c make test

      - name: Build with Nix
        if: runner.os == 'Linux'
        run: nix build .#static

      - name: Create tarball
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          BIN="result/bin/xoml"
          ls -l "$BIN"
          cp "$BIN" dist/xoml
          chmod u+w dist/xoml
          strip dist/xoml
          TAG="${{ github.ref_name }}"
          FILENAME="xoml-${TAG}-${{ matrix.target }}.tar.gz"
          tar -C dist -czf "$FILENAME" xoml
          ls -l "$FILENAME"

      - name: Set up OCaml on Windows
        if: runner.os == 'Windows'
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5

      - name: Run tests on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          opam install . --deps-only --with-test -y
          opam exec -- dune runtest

      - name: Set up MSVC on Windows
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          opam exec -- dune build --profile release
          Get-ChildItem "_build\default\src"
          Copy-Item "_build\default\src\xo.exe" "_build\default\src\xoml.exe" -Force
          if (!(Test-Path "_build\default\src\xoml.exe")) {
            throw "xoml.exe was not created"
          }
          editbin /SUBSYSTEM:WINDOWS "_build\default\src\xoml.exe"

      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item "_build\default\src\xo.exe"   "dist\xoml-console.exe"
          Copy-Item "_build\default\src\xoml.exe" "dist\xoml.exe"
          $tag="${{ github.ref_name }}"
          $filename="xoml-$tag-${{ matrix.target }}.zip"
          Compress-Archive -Path dist/* -DestinationPath $filename

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            xoml-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            xoml-${{ github.ref_name }}-${{ matrix.target }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
